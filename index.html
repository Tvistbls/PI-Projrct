<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Два круга</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        
        .circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .circle:hover {
            transform: scale(1.05);
        }
        
        .circle1 {
            background-color: #ff6b6b;
        }
        
        .circle2 {
            background-color: #4ecdc4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle circle1">Круг 1</div>
        <div class="circle circle2">Круг 2</div>
    </div>
</body>
</html>
